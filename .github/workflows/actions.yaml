name: GitHub Actions

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Prepare VPS Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: mkdir -p /home/debian/wordpress-docker/todo-app/

      - name: Upload files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "src,public,package.json,package-lock.json,astro.config.ts,tailwind.config.js,tsconfig.json,Dockerfile,docker-compose.yml,nginx,vendor,.dockerignore"
          target: "/home/debian/wordpress-docker/todo-app/"
          rm: true

      - name: Deploy and Debug
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "==== Parent docker-compose.yml ===="
            cat /home/debian/wordpress-docker/docker-compose.yml || echo "Not found"
            
            echo "==== Starting deployment ===="
            cd /home/debian/wordpress-docker
            docker compose build --no-cache todo-app
            docker compose stop todo-app || true
            docker compose rm -f todo-app || true
            docker compose up -d todo-app
            
            echo "==== Checking container contents ===="
            docker exec todo-app ls -la /usr/share/nginx/html || echo "Failed to ls html"
            docker exec todo-app cat /usr/share/nginx/html/index.html | head -n 10 || echo "Failed to cat index.html"
