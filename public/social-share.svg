<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="white" opacity="0.1"/>
  <circle cx="1100" cy="550" r="80" fill="white" opacity="0.1"/>
  <circle cx="200" cy="500" r="40" fill="white" opacity="0.08"/>
  <circle cx="1000" cy="100" r="50" fill="white" opacity="0.08"/>

  <!-- Logo Circle with Checkmark -->
  <g transform="translate(250, 215)">
    <circle cx="100" cy="100" r="90" fill="white" opacity="0.95"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke="#2C5F8D" stroke-width="8"/>
    <path d="M 65 100 L 90 125 L 140 70"
          stroke="#2C5F8D"
          stroke-width="10"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Text Content -->
  <g transform="translate(480, 250)">
    <!-- "123 ToDo" -->
    <text x="0" y="0"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
          font-size="72"
          font-weight="700"
          fill="white">
      123 ToDo
    </text>

    <!-- "FREE Simple Task Management" -->
    <text x="0" y="60"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
          font-size="32"
          font-weight="400"
          fill="white"
          opacity="0.95">
      <tspan font-weight="700">FREE</tspan> Simple Task Management
    </text>

    <!-- Tagline -->
    <text x="0" y="110"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
          font-size="24"
          font-weight="300"
          fill="white"
          opacity="0.9">
      Priority-based • Offline Support • No Tracking
    </text>
  </g>
</svg>
