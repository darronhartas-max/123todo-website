<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="teamGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2E8F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CBD5E1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#teamGradient)"/>

  <!-- Three people icon -->
  <g transform="translate(200, 180)">
    <!-- Center person (larger) -->
    <circle cx="0" cy="-20" r="32" fill="#94A3B8"/>
    <ellipse cx="0" cy="40" rx="42" ry="50" fill="#CBD5E1"/>

    <!-- Left person -->
    <g transform="translate(-75, 15)">
      <circle cx="0" cy="0" r="26" fill="#94A3B8" opacity="0.8"/>
      <ellipse cx="0" cy="50" rx="36" ry="42" fill="#CBD5E1" opacity="0.8"/>
    </g>

    <!-- Right person -->
    <g transform="translate(75, 15)">
      <circle cx="0" cy="0" r="26" fill="#94A3B8" opacity="0.8"/>
      <ellipse cx="0" cy="50" rx="36" ry="42" fill="#CBD5E1" opacity="0.8"/>
    </g>
  </g>

  <!-- Community circles behind -->
  <circle cx="200" cy="200" r="145" fill="none" stroke="#94A3B8" stroke-width="2" opacity="0.2" stroke-dasharray="10,10"/>
</svg>
