<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F1F5F9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bgGrad1)"/>

  <!-- Calendar/Clock combination for beginners -->
  <g transform="translate(200, 150)">
    <!-- Calendar -->
    <rect x="-70" y="-70" width="140" height="140" rx="8" fill="#CBD5E1"/>
    <rect x="-70" y="-70" width="140" height="35" rx="8" fill="#94A3B8"/>

    <!-- Calendar grid -->
    <g opacity="0.6">
      <line x1="-45" y1="-10" x2="-45" y2="60" stroke="#94A3B8" stroke-width="2"/>
      <line x1="-10" y1="-10" x2="-10" y2="60" stroke="#94A3B8" stroke-width="2"/>
      <line x1="25" y1="-10" x2="25" y2="60" stroke="#94A3B8" stroke-width="2"/>
      <line x1="-60" y1="10" x2="60" y2="10" stroke="#94A3B8" stroke-width="2"/>
      <line x1="-60" y1="35" x2="60" y2="35" stroke="#94A3B8" stroke-width="2"/>
    </g>

    <!-- Clock overlay -->
    <circle cx="50" cy="-50" r="40" fill="#E2E8F0" stroke="#94A3B8" stroke-width="3"/>
    <circle cx="50" cy="-50" r="3" fill="#94A3B8"/>
    <line x1="50" y1="-50" x2="50" y2="-70" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="-50" x2="65" y2="-50" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
