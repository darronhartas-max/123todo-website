<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bgGrad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F1F5F9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bgGrad7)"/>

  <!-- Two devices separated -->
  <g transform="translate(200, 150)">
    <!-- Work device (left) -->
    <rect x="-110" y="-60" width="70" height="120" rx="8" fill="#94A3B8"/>
    <rect x="-105" y="-55" width="60" height="90" rx="3" fill="#CBD5E1"/>
    <text x="-75" y="-20" text-anchor="middle" font-size="28" fill="#94A3B8">💼</text>

    <!-- Personal device (right) -->
    <rect x="40" y="-60" width="70" height="120" rx="8" fill="#94A3B8"/>
    <rect x="45" y="-55" width="60" height="90" rx="3" fill="#CBD5E1"/>
    <text x="75" y="-20" text-anchor="middle" font-size="28" fill="#94A3B8">🏠</text>

    <!-- Separator line -->
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#64748B" stroke-width="3" stroke-dasharray="8,8"/>

    <!-- Balance/checkmark -->
    <circle cx="0" cy="80" r="20" fill="#94A3B8" opacity="0.3"/>
    <path d="M -8 80 L -2 86 L 10 74" stroke="#64748B" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
