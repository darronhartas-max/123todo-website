<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background elements -->
  <rect width="800" height="600" fill="#F8F9FF"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#E8EEFF" opacity="0.5"/>
  <circle cx="700" cy="500" r="80" fill="#FFF4E6" opacity="0.5"/>
  <circle cx="650" cy="120" r="50" fill="#F0FFF4" opacity="0.5"/>

  <!-- Large task board/calendar background -->
  <rect x="400" y="120" width="320" height="400" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Task board header -->
  <rect x="400" y="120" width="320" height="50" rx="12" fill="#6366F1"/>
  <rect x="400" y="158" width="320" height="12" fill="#6366F1"/>

  <!-- Task board title -->
  <text x="560" y="152" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">My Tasks</text>

  <!-- Priority 1 - Must Do (Red) -->
  <rect x="420" y="190" width="280" height="50" rx="8" fill="#FEE2E2"/>
  <circle cx="440" cy="215" r="8" fill="#EF4444"/>
  <text x="460" y="220" font-family="Arial, sans-serif" font-size="14" fill="#991B1B">Complete project proposal</text>
  <path d="M670 210 L675 215 L685 205" stroke="#22C55E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Priority 2 - Should Do (Orange) -->
  <rect x="420" y="255" width="280" height="50" rx="8" fill="#FED7AA"/>
  <circle cx="440" cy="280" r="8" fill="#F97316"/>
  <text x="460" y="285" font-family="Arial, sans-serif" font-size="14" fill="#9A3412">Review team feedback</text>
  <path d="M670 275 L675 280 L685 270" stroke="#22C55E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Priority 3 - Could Do (Gray) -->
  <rect x="420" y="320" width="280" height="50" rx="8" fill="#F3F4F6"/>
  <circle cx="440" cy="345" r="8" fill="#6B7280"/>
  <text x="460" y="350" font-family="Arial, sans-serif" font-size="14" fill="#374151">Update documentation</text>

  <!-- Priority 4 - On Hold (Purple) -->
  <rect x="420" y="385" width="280" height="50" rx="8" fill="#F3E8FF"/>
  <circle cx="440" cy="410" r="8" fill="#A855F7"/>
  <text x="460" y="415" font-family="Arial, sans-serif" font-size="14" fill="#6B21A8">Research new tools</text>

  <!-- Calendar icon -->
  <rect x="430" y="460" width="50" height="45" rx="4" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  <rect x="430" y="460" width="50" height="12" rx="4" fill="#6366F1"/>
  <text x="455" y="490" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#6366F1" text-anchor="middle">28</text>

  <!-- Clock icon -->
  <circle cx="520" cy="482" r="20" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  <line x1="520" y1="482" x2="520" y2="470" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>
  <line x1="520" y1="482" x2="528" y2="482" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>

  <!-- Achievement badge -->
  <circle cx="575" cy="482" r="22" fill="#22C55E"/>
  <path d="M565 482 L572 489 L585 476" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Productivity chart icon -->
  <rect x="620" y="470" width="10" height="25" rx="2" fill="#6366F1"/>
  <rect x="635" y="480" width="10" height="15" rx="2" fill="#A78BFA"/>
  <rect x="650" y="460" width="10" height="35" rx="2" fill="#6366F1"/>

  <!-- Person character -->
  <!-- Head -->
  <circle cx="200" cy="240" r="45" fill="#FBBF24"/>

  <!-- Hair -->
  <path d="M155 240 Q155 200 200 195 Q245 200 245 240" fill="#92400E"/>

  <!-- Face details -->
  <circle cx="185" cy="235" r="5" fill="#92400E"/>
  <circle cx="215" cy="235" r="5" fill="#92400E"/>
  <path d="M185 255 Q200 265 215 255" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="160" y="285" width="80" height="120" rx="40" fill="#6366F1"/>

  <!-- Arms -->
  <!-- Left arm pointing to tasks -->
  <ellipse cx="130" cy="330" rx="18" ry="45" fill="#6366F1" transform="rotate(-30 130 330)"/>
  <circle cx="115" cy="355" r="15" fill="#FBBF24"/>

  <!-- Right arm holding phone/device -->
  <ellipse cx="270" cy="320" rx="18" ry="45" fill="#6366F1" transform="rotate(25 270 320)"/>
  <circle cx="285" cy="340" r="15" fill="#FBBF24"/>

  <!-- Phone/device in hand -->
  <rect x="275" y="335" width="35" height="55" rx="6" fill="#1F2937" stroke="#6B7280" stroke-width="2"/>
  <rect x="280" y="342" width="25" height="38" rx="2" fill="#10B981"/>
  <circle cx="292.5" cy="385" r="3" fill="#6B7280"/>

  <!-- Legs -->
  <rect x="170" y="400" width="25" height="70" rx="12" fill="#3730A3"/>
  <rect x="205" y="400" width="25" height="70" rx="12" fill="#3730A3"/>

  <!-- Shoes -->
  <ellipse cx="182" cy="475" rx="20" ry="10" fill="#1F2937"/>
  <ellipse cx="217" cy="475" rx="20" ry="10" fill="#1F2937"/>

  <!-- Thought bubble showing organization -->
  <circle cx="120" cy="160" r="30" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="90" cy="175" r="15" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="75" cy="185" r="8" fill="white" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Stars in thought bubble -->
  <path d="M120 155 L122 162 L129 162 L123 167 L125 174 L120 169 L115 174 L117 167 L111 162 L118 162 Z" fill="#FBBF24"/>
  <circle cx="105" cy="175" r="2" fill="#6366F1"/>
  <circle cx="135" cy="170" r="2" fill="#22C55E"/>

  <!-- Floating task checkmarks -->
  <g opacity="0.6">
    <circle cx="320" cy="180" r="20" fill="#D1FAE5"/>
    <path d="M310 180 L316 186 L330 172" stroke="#22C55E" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g opacity="0.6">
    <circle cx="350" cy="480" r="18" fill="#FEF3C7"/>
    <path d="M342 480 L347 485 L358 474" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Decorative productivity icons -->
  <!-- Target/Goal icon -->
  <circle cx="250" cy="100" r="25" fill="#FEE2E2" opacity="0.7"/>
  <circle cx="250" cy="100" r="18" fill="#FCA5A5" opacity="0.7"/>
  <circle cx="250" cy="100" r="10" fill="#EF4444" opacity="0.9"/>
  <circle cx="250" cy="100" r="4" fill="#DC2626"/>

  <!-- Lightning/Energy icon -->
  <path d="M320 520 L310 540 L318 540 L312 560 L328 535 L320 535 Z" fill="#FBBF24" opacity="0.7"/>

  <!-- Arrow showing progress -->
  <path d="M50 450 Q100 420 150 440" stroke="#6366F1" stroke-width="3" fill="none" stroke-dasharray="5,5" opacity="0.4"/>
  <path d="M145 435 L150 440 L145 445" stroke="#6366F1" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
</svg>
