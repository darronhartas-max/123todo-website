<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2FF;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgGradient)"/>

  <!-- Floating abstract elements -->
  <circle cx="120" cy="100" r="40" fill="#6366F1" opacity="0.08"/>
  <circle cx="680" cy="480" r="60" fill="#22C55E" opacity="0.08"/>
  <circle cx="720" cy="140" r="35" fill="#A855F7" opacity="0.08"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="200" x2="300" y2="200" stroke="#E2E8F0" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="400" x2="250" y2="400" stroke="#E2E8F0" stroke-width="1" opacity="0.3"/>
  <line x1="600" y1="150" x2="800" y2="150" stroke="#E2E8F0" stroke-width="1" opacity="0.3"/>

  <!-- Main device/tablet -->
  <g filter="url(#shadow)">
    <rect x="220" y="80" width="360" height="480" rx="20" fill="#1E293B"/>
    <rect x="235" y="95" width="330" height="450" rx="8" fill="url(#screenGradient)"/>
  </g>

  <!-- App header bar -->
  <rect x="235" y="95" width="330" height="60" rx="8" fill="#6366F1"/>
  <rect x="235" y="143" width="330" height="12" fill="#6366F1"/>

  <!-- App title -->
  <text x="400" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600" fill="white" text-anchor="middle">My Tasks</text>

  <!-- Task counter badge -->
  <circle cx="500" cy="125" r="14" fill="white" opacity="0.3"/>
  <text x="500" y="131" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">8</text>

  <!-- Priority 1 Tasks - Must Do (Red) -->
  <g filter="url(#softShadow)">
    <rect x="255" y="175" width="290" height="60" rx="10" fill="white"/>
    <rect x="255" y="175" width="6" height="60" rx="3" fill="#EF4444"/>
    <text x="275" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#991B1B" letter-spacing="0.5">MUST DO</text>
    <text x="275" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#1E293B">Complete project proposal</text>
    <circle cx="520" cy="208" r="10" fill="#22C55E"/>
    <path d="M516 208 L519 211 L525 205" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Priority 1 Task 2 -->
  <g filter="url(#softShadow)">
    <rect x="255" y="245" width="290" height="60" rx="10" fill="white"/>
    <rect x="255" y="245" width="6" height="60" rx="3" fill="#EF4444"/>
    <text x="275" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#991B1B" letter-spacing="0.5">MUST DO</text>
    <text x="275" y="285" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#1E293B">Client presentation slides</text>
    <circle cx="520" cy="278" r="10" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5"/>
  </g>

  <!-- Priority 2 Tasks - Should Do (Orange) -->
  <g filter="url(#softShadow)">
    <rect x="255" y="315" width="290" height="60" rx="10" fill="white"/>
    <rect x="255" y="315" width="6" height="60" rx="3" fill="#F97316"/>
    <text x="275" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#9A3412" letter-spacing="0.5">SHOULD DO</text>
    <text x="275" y="355" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#1E293B">Review team feedback</text>
    <circle cx="520" cy="348" r="10" fill="#22C55E"/>
    <path d="M516 348 L519 351 L525 345" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Priority 3 Tasks - Could Do (Gray) -->
  <g filter="url(#softShadow)">
    <rect x="255" y="385" width="290" height="60" rx="10" fill="white"/>
    <rect x="255" y="385" width="6" height="60" rx="3" fill="#6B7280"/>
    <text x="275" y="405" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#374151" letter-spacing="0.5">COULD DO</text>
    <text x="275" y="425" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#1E293B">Update documentation</text>
    <circle cx="520" cy="418" r="10" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5"/>
  </g>

  <!-- Priority 4 Tasks - On Hold (Purple) -->
  <g filter="url(#softShadow)">
    <rect x="255" y="455" width="290" height="60" rx="10" fill="white"/>
    <rect x="255" y="455" width="6" height="60" rx="3" fill="#A855F7"/>
    <text x="275" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#6B21A8" letter-spacing="0.5">ON HOLD</text>
    <text x="275" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#1E293B">Research new features</text>
    <circle cx="520" cy="488" r="10" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5"/>
  </g>

  <!-- Left hand -->
  <ellipse cx="180" cy="380" rx="35" ry="45" fill="#FBBF24" opacity="0.95"/>
  <ellipse cx="165" cy="350" rx="12" ry="30" fill="#FBBF24" opacity="0.95"/>
  <ellipse cx="180" cy="345" rx="12" ry="32" fill="#FBBF24" opacity="0.95"/>
  <ellipse cx="195" cy="343" rx="12" ry="30" fill="#FBBF24" opacity="0.95"/>
  <ellipse cx="208" cy="348" rx="11" ry="26" fill="#FBBF24" opacity="0.95"/>
  <rect x="160" y="400" width="45" height="80" rx="8" fill="#FBBF24" opacity="0.95"/>

  <!-- Right hand - finger pointing/touching -->
  <ellipse cx="620" cy="320" rx="35" ry="45" fill="#FBBF24" opacity="0.95" transform="rotate(-10 620 320)"/>
  <ellipse cx="640" cy="295" rx="12" ry="30" fill="#FBBF24" opacity="0.95" transform="rotate(-10 640 295)"/>
  <ellipse cx="625" cy="290" rx="12" ry="32" fill="#FBBF24" opacity="0.95" transform="rotate(-10 625 290)"/>
  <ellipse cx="610" cy="292" rx="12" ry="30" fill="#FBBF24" opacity="0.95" transform="rotate(-10 610 292)"/>

  <!-- Extended index finger touching screen -->
  <ellipse cx="595" cy="240" rx="10" ry="35" fill="#FBBF24" opacity="0.95" transform="rotate(-25 595 240)"/>
  <circle cx="575" cy="218" r="13" fill="#FBBF24" opacity="0.95"/>

  <!-- Touch indicator -->
  <circle cx="520" cy="208" r="20" fill="#22C55E" opacity="0.15"/>
  <circle cx="520" cy="208" r="25" fill="#22C55E" opacity="0.08"/>

  <rect x="610" y="345" width="45" height="70" rx="8" fill="#FBBF24" opacity="0.95" transform="rotate(-10 632 380)"/>

  <!-- Floating success indicators -->
  <g opacity="0.7">
    <circle cx="140" cy="200" r="24" fill="white" filter="url(#softShadow)"/>
    <circle cx="140" cy="200" r="18" fill="#22C55E" opacity="0.15"/>
    <path d="M132 200 L137 205 L148 194" stroke="#22C55E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g opacity="0.7">
    <circle cx="670" cy="420" r="20" fill="white" filter="url(#softShadow)"/>
    <circle cx="670" cy="420" r="15" fill="#6366F1" opacity="0.15"/>
    <text x="670" y="427" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#6366F1" text-anchor="middle">5</text>
  </g>

  <!-- Subtle animated checkmark icon -->
  <g opacity="0.5">
    <circle cx="110" cy="480" r="18" fill="white" filter="url(#softShadow)"/>
    <path d="M103 480 L108 485 L117 476" stroke="#F97316" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
