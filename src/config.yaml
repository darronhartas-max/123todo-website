site:
  name: 123 ToDo
  site: 'https://www.123todo.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

# Default SEO metadata
metadata:
  title:
    default: 123 ToDo - FREE Simple, Powerful Task Management
    template: '%s | 123 ToDo'
  description: "FREE priority-based task management with offline support, achievement tracking, and zero tracking. Your tasks, your control."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 123 ToDo
    images:
      - url: 'https://www.123todo.com/social-share.svg'
        width: 1200
        height: 630
    type: website
  twitter:
    handle: '@123todo'
    site: '@123todo'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
